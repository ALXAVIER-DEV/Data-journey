name: "Terraform Workflow"
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-assume-role-arn:
        type: string
        required: true
      aws-region:
        type: string
        required: true
      aws-statefile-bucket:
        type: string
        required: true
      aws-lock-athena-table:
        type: string
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ inputs.aws-region }}

      - name: Ensure Terraform backend exists
        run: |
          set -euo pipefail

          BUCKET="${{ inputs.aws-statefile-bucket }}"
          REGION="${{ inputs.aws-region }}"
          LOCK_TABLE="${{ inputs.aws-lock-athena-table }}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api wait bucket-exists --bucket "$BUCKET"
          fi

          if ! aws dynamodb describe-table --table-name "$LOCK_TABLE" --region "$REGION" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE" --region "$REGION"
          fi

      - name: Terraform Initialize
        run: |
          cd infra/terraform
          terraform init -input=false \
            -backend-config="bucket=${{ inputs.aws-statefile-bucket }}" \
            -backend-config="key=${{ github.repository }}/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws-region }}" \
            -backend-config="dynamodb_table=${{ inputs.aws-lock-athena-table }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        id: terraform-plan
        run: |
          cd infra/terraform
          terraform workspace select -or-create=true ${{ inputs.environment }}
          terraform plan -input=false -var-file="./modules/envs/${{ inputs.environment }}/terraform.tfvars" -out="${{ inputs.environment }}.plan"

      - name: Terraform Apply
        id: terraform-apply
        run: |
          cd infra/terraform
          terraform workspace select -or-create=true ${{ inputs.environment }}
          terraform apply -auto-approve -input=false "${{ inputs.environment }}.plan"
