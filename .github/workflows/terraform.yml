name: "Terraform Workflow"
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-assume-role-arn:
        type: string
        required: true
      aws-region:
        type: string
        required: true
      aws-statefile-bucket:
        type: string
        required: true
      aws-lock-athena-table:
        type: string
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform Initialize
        run: |
          cd infra/terraform
          terraform init -input=false

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        id: terraform-plan
        run: |
          cd infra/terraform
          terraform workspace select -or-create=true ${{ inputs.environment }}
          terraform plan -input=false -var-file="./modules/envs/${{ inputs.environment }}/terraform.tfvars" -out="${{ inputs.environment }}.plan"

      - name: Terraform Apply
        id: terraform-apply
        run: |
          cd infra/terraform
          terraform workspace select -or-create=true ${{ inputs.environment }}
          terraform apply -auto-approve -input=false "${{ inputs.environment }}.plan"
