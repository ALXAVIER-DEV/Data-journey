name: Deploy DEV

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:

  # ✅ JOB 1: Build e upload dos artefatos — roda ANTES do Terraform
  upload-artifacts:
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_REGION: sa-east-1
      ROLE_TO_ASSUME: arn:aws:iam::584047610071:role/github-actions-deploy-role-axcloud
      S3_BUCKET: axcloud-lab-sa-east-1-data
      SQL_S3_KEY: sql/dml/insert_curated_messages.sql
      GLUE_SCRIPT_S3_KEY: glue/python_shell/runner.py
      LAMBDA_S3_KEY: lambda/lambda.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC

      - name: Build and upload Lambda ZIP
        run: |
          set -euo pipefail

          echo "📦 Criando ZIP da Lambda..."
          cd src/lambda_ingest

          if [ -f requirements.txt ]; then
            echo "📥 Instalando dependências..."
            pip install -r requirements.txt -t . --quiet
          fi

          zip -r ../../lambda.zip . \
            -x "*.pyc" \
            -x "*__pycache__*" \
            -x "*.git*" \
            -x "*.md"

          cd ../..
          ls -lh lambda.zip

          echo "☁️ Enviando ZIP para S3..."
          aws s3 cp lambda.zip \
            "s3://${S3_BUCKET}/${LAMBDA_S3_KEY}" \
            --region "${AWS_REGION}"

          echo "✅ ZIP enviado: s3://${S3_BUCKET}/${LAMBDA_S3_KEY}"

      - name: Upload Athena DML to S3
        run: |
          set -euo pipefail
          aws s3 cp "athena/dml/insert_curated_messages.sql" \
            "s3://${S3_BUCKET}/${SQL_S3_KEY}" \
            --region "${AWS_REGION}"
          echo "✅ SQL enviado: s3://${S3_BUCKET}/${SQL_S3_KEY}"

      - name: Upload Glue script to S3
        run: |
          set -euo pipefail
          aws s3 cp "glue/python_shell/runner.py" \
            "s3://${S3_BUCKET}/${GLUE_SCRIPT_S3_KEY}" \
            --region "${AWS_REGION}"
          echo "✅ Glue script enviado: s3://${S3_BUCKET}/${GLUE_SCRIPT_S3_KEY}"

  # ✅ JOB 2: Terraform — roda APÓS os artefatos estarem no S3
  terraform:
    needs: upload-artifacts
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      aws-assume-role-arn: arn:aws:iam::584047610071:role/github-actions-deploy-role-axcloud
      aws-region: sa-east-1
      aws-statefile-bucket: axcloud-lab-sa-east-1-terraform-state
      aws-lock-athena-table: axcloud_lab_terraform_locks

  # ✅ JOB 3: Deploy — roda APÓS o Terraform garantir que os recursos existem
  deploy:
    runs-on: ubuntu-latest
    needs: terraform
    environment: dev

    env:
      AWS_REGION: sa-east-1
      ROLE_TO_ASSUME: arn:aws:iam::584047610071:role/github-actions-deploy-role-axcloud
      S3_BUCKET: axcloud-lab-sa-east-1-data
      LAMBDA_NAME: axcloud-lab-lambda-ingest
      GLUE_JOB_NAME: axcloud-lab-glue-shell-athena-exec
      SNS_TOPIC_ARN: arn:aws:sns:sa-east-1:584047610071:axcloud-lab-topic-ingest
      GLUE_SCRIPT_S3_KEY: glue/python_shell/runner.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC

      - name: Deploy Lambda
        run: |
          set -euo pipefail

          if aws lambda get-function \
              --function-name "${LAMBDA_NAME}" \
              --region "${AWS_REGION}" > /dev/null 2>&1; then

            echo "✅ Função existe. Atualizando código..."

            # Faz o download do ZIP que foi enviado no job anterior
            aws s3 cp "s3://axcloud-lab-sa-east-1-data/lambda/lambda.zip" \
              lambda.zip --region "${AWS_REGION}"

            aws lambda update-function-code \
              --function-name "${LAMBDA_NAME}" \
              --zip-file "fileb://lambda.zip" \
              --region "${AWS_REGION}"

            aws lambda wait function-updated \
              --function-name "${LAMBDA_NAME}" \
              --region "${AWS_REGION}"

            echo "✅ Lambda atualizada com sucesso."
          else
            echo "::error::Lambda '${LAMBDA_NAME}' não existe em ${AWS_REGION}."
            exit 1
          fi

      - name: Update Glue Job script location
        run: |
          set -euo pipefail

          # Busca a role atual do Glue Job para não perder a configuração
          GLUE_ROLE=$(aws glue get-job \
            --job-name "${GLUE_JOB_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Job.Role' \
            --output text)

          echo "🔍 Role atual do Glue Job: $GLUE_ROLE"

          aws glue update-job \
            --job-name "${GLUE_JOB_NAME}" \
            --region "${AWS_REGION}" \
            --job-update "{
              \"Role\": \"$GLUE_ROLE\",
              \"Command\": {
                \"Name\": \"pythonshell\",
                \"ScriptLocation\": \"s3://${S3_BUCKET}/${GLUE_SCRIPT_S3_KEY}\"
              }
            }"

          echo "✅ Glue Job atualizado: ${GLUE_JOB_NAME}"

      - name: Smoke test - publish SNS message
        run: |
          set -euo pipefail
          MESSAGE_ID=$(aws sns publish \
            --topic-arn "${SNS_TOPIC_ARN}" \
            --message "{\"hello\":\"world\",\"from\":\"github-actions-dev\"}" \
            --region "${AWS_REGION}" \
            --query 'MessageId' \
            --output text)
          echo "✅ SNS publicado. MessageId: $MESSAGE_ID"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy DEV falhou. Verifique os logs acima."