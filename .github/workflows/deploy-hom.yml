name: Deploy HOM

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - hom

jobs:
  upload-artifacts:
    runs-on: ubuntu-latest
    environment: hom

    env:
      AWS_REGION: sa-east-1
      ROLE_TO_ASSUME: arn:aws:iam::584047610071:role/github-actions-deploy-role-axcloud
      S3_BUCKET: hom-axcloud-lab-sa-east-1-data
      SQL_S3_KEY: sql/dml/insert_curated_messages.sql
      GLUE_SCRIPT_S3_KEY: glue/python_shell/runner.py
      LAMBDA_S3_KEY: lambda/lambda.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC

      - name: Build and upload Lambda ZIP
        run: |
          set -euo pipefail
          cd src/lambda_ingest

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt -t . --quiet
          fi

          zip -r ../../lambda.zip . \
            -x "*.pyc" \
            -x "*__pycache__*" \
            -x "*.git*" \
            -x "*.md"

          cd ../..
          aws s3 cp lambda.zip "s3://${S3_BUCKET}/${LAMBDA_S3_KEY}" --region "${AWS_REGION}"

      - name: Upload Athena DML to S3
        run: |
          set -euo pipefail
          aws s3 cp "athena/dml/insert_curated_messages.sql" \
            "s3://${S3_BUCKET}/${SQL_S3_KEY}" \
            --region "${AWS_REGION}"

      - name: Upload Glue script to S3
        run: |
          set -euo pipefail
          aws s3 cp "glue/python_shell/runner.py" \
            "s3://${S3_BUCKET}/${GLUE_SCRIPT_S3_KEY}" \
            --region "${AWS_REGION}"

  terraform:
    needs: upload-artifacts
    uses: ./.github/workflows/terraform.yml
    with:
      environment: hom
      aws-assume-role-arn: arn:aws:iam::584047610071:role/github-actions-deploy-role-axcloud
      aws-region: sa-east-1
      aws-statefile-bucket: axcloud-lab-sa-east-1-terraform-state
      aws-lock-athena-table: axcloud_lab_terraform_locks

  deploy:
    runs-on: ubuntu-latest
    needs: terraform
    environment: hom

    env:
      AWS_REGION: sa-east-1
      ROLE_TO_ASSUME: arn:aws:iam::584047610071:role/github-actions-deploy-role-axcloud
      S3_BUCKET: hom-axcloud-lab-sa-east-1-data
      LAMBDA_NAME: hom-axcloud-lab-lambda-ingest
      GLUE_JOB_NAME: hom-axcloud-lab-glue-shell-athena-exec
      SNS_TOPIC_ARN: arn:aws:sns:sa-east-1:584047610071:hom-axcloud-lab-topic-ingest
      GLUE_SCRIPT_S3_KEY: glue/python_shell/runner.py
      LAMBDA_S3_KEY: lambda/lambda.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC

      - name: Deploy Lambda
        run: |
          set -euo pipefail

          aws s3 cp "s3://${S3_BUCKET}/${LAMBDA_S3_KEY}" \
            lambda.zip --region "${AWS_REGION}"

          aws lambda update-function-code \
            --function-name "${LAMBDA_NAME}" \
            --zip-file "fileb://lambda.zip" \
            --region "${AWS_REGION}"

          aws lambda wait function-updated \
            --function-name "${LAMBDA_NAME}" \
            --region "${AWS_REGION}"

      - name: Update Glue Job script location
        run: |
          set -euo pipefail

          GLUE_ROLE=$(aws glue get-job \
            --job-name "${GLUE_JOB_NAME}" \
            --region "${AWS_REGION}" \
            --query 'Job.Role' \
            --output text)

          aws glue update-job \
            --job-name "${GLUE_JOB_NAME}" \
            --region "${AWS_REGION}" \
            --job-update "{
              \"Role\": \"$GLUE_ROLE\",
              \"Command\": {
                \"Name\": \"pythonshell\",
                \"ScriptLocation\": \"s3://${S3_BUCKET}/${GLUE_SCRIPT_S3_KEY}\"
              }
            }"

      - name: Smoke test - publish SNS message
        run: |
          set -euo pipefail
          aws sns publish \
            --topic-arn "${SNS_TOPIC_ARN}" \
            --message "{\"hello\":\"world\",\"from\":\"github-actions-hom\"}" \
            --region "${AWS_REGION}"
